  - posicion: 8
    nombre: nombre_cliente
    tipo: string
  - posicion: 10
    nombre: monto_actual
    tipo: decimal
  - posicion: 11
    nombre: fecha_vencimiento
    tipo: date
    formato: DD/MM/YYYY
  - posicion: 12
    nombre: dias_mora
    tipo: int
  - posicion: 13
    nombre: tramo
    tipo: categorical
  - posicion: 15
    nombre: dni_cliente
    tipo: string
  - posicion: 28
    nombre: monto_total
    tipo: decimal
  - posicion: 87
    nombre: producto
    tipo: categorical
